name: build

on:
  push:
    tags:
      - "v*"

jobs:
  quality:
    name: quality-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.2"

      - name: Verify formatting
        run: |
          files=$(find . -type f -name '*.go')
          if [ -n "$files" ]; then
            unformatted=$(gofmt -l $files)
            if [ -n "$unformatted" ]; then
              echo "Unformatted Go files:"
              echo "$unformatted"
              exit 1
            fi
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          args: --timeout=5m ./...

      - name: Run coverage gate
        run: bash scripts/coverage-check.sh

  build:
    needs: quality
    name: ${{ matrix.package_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_name: db-ferry-linux-x64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            binary_name: db-ferry
            archive_suffix: linux-amd64
          - package_name: db-ferry-linux-arm64
            runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            binary_name: db-ferry
            archive_suffix: linux-arm64
          - package_name: db-ferry-darwin-x64
            runner: macos-15-intel
            goos: darwin
            goarch: amd64
            binary_name: db-ferry
            archive_suffix: darwin-amd64
          - package_name: db-ferry-darwin-arm64
            runner: macos-15
            goos: darwin
            goarch: arm64
            binary_name: db-ferry
            archive_suffix: darwin-arm64
          - package_name: db-ferry-windows-x64
            runner: windows-latest
            goos: windows
            goarch: amd64
            binary_name: db-ferry.exe
            archive_suffix: windows-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.2"

      - name: Install MSYS2 (Windows)
        if: startsWith(matrix.runner, 'windows')
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc
          path-type: inherit

      - name: Download dependencies
        run: go mod download

      - name: Set version metadata
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
            latest_tag="${latest_tag#v}"
            short_sha=$(git rev-parse --short=7 HEAD)
            version="${latest_tag}-${short_sha}"
          fi

          echo "VERSION=${version}" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=db-ferry-${version}-${{ matrix.archive_suffix }}.tgz" >> "$GITHUB_ENV"

      - name: Build (Unix)
        if: ${{ !startsWith(matrix.runner, 'windows') }}
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -ldflags "-X main.version=${VERSION}" -o "dist/${{ matrix.binary_name }}"

      - name: Build (Windows)
        if: startsWith(matrix.runner, 'windows')
        shell: msys2 {0}
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -ldflags "-X main.version=${VERSION}" -o "dist/${{ matrix.binary_name }}"

      - name: Package (Unix)
        if: ${{ !startsWith(matrix.runner, 'windows') }}
        run: |
          tar -czf "dist/${ARCHIVE_NAME}" -C dist "${{ matrix.binary_name }}"

      - name: Package (Windows)
        if: startsWith(matrix.runner, 'windows')
        shell: msys2 {0}
        run: |
          tar -czf "dist/${ARCHIVE_NAME}" -C dist "${{ matrix.binary_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.package_name }}-artifacts
          path: dist/

  publish-npm:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          path: .artifacts

      - name: Set npm package versions
        run: node scripts/set-npm-version.mjs "${GITHUB_REF_NAME#v}"

      - name: Stage platform binaries
        run: |
          node scripts/prepare-npm-package.mjs npm/db-ferry-linux-x64 .artifacts/db-ferry-linux-x64-artifacts/db-ferry
          node scripts/prepare-npm-package.mjs npm/db-ferry-linux-arm64 .artifacts/db-ferry-linux-arm64-artifacts/db-ferry
          node scripts/prepare-npm-package.mjs npm/db-ferry-darwin-x64 .artifacts/db-ferry-darwin-x64-artifacts/db-ferry
          node scripts/prepare-npm-package.mjs npm/db-ferry-darwin-arm64 .artifacts/db-ferry-darwin-arm64-artifacts/db-ferry
          node scripts/prepare-npm-package.mjs npm/db-ferry-windows-x64 .artifacts/db-ferry-windows-x64-artifacts/db-ferry.exe

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ""
        run: |
          node scripts/publish-npm-package.mjs npm/db-ferry-linux-x64
          node scripts/publish-npm-package.mjs npm/db-ferry-linux-arm64
          node scripts/publish-npm-package.mjs npm/db-ferry-darwin-x64
          node scripts/publish-npm-package.mjs npm/db-ferry-darwin-arm64
          node scripts/publish-npm-package.mjs npm/db-ferry-windows-x64

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ""
        run: node scripts/publish-npm-package.mjs .
